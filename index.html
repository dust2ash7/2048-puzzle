<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .tile {
            transition: all 0.15s ease;
            font-size: 2.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center font-sans">
    <div class="max-w-md w-full mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-6xl font-bold text-amber-400 tracking-tighter">2048</h1>
                <p class="text-zinc-400 text-sm mt-1">by Sean • nrsteward</p>
            </div>
            <!-- Your anime avatar (replace URL later) -->
            <img src="https://i.imgur.com/YourAnimeImageHere.jpg" alt="Sean Anime" class="w-16 h-16 rounded-2xl border-4 border-amber-400 shadow-lg">
        </div>

        <!-- Scores -->
        <div class="flex gap-4 mb-6">
            <div class="flex-1 bg-zinc-900 rounded-3xl p-4 text-center">
                <div class="text-xs text-zinc-400 tracking-widest">SCORE</div>
                <div id="score" class="text-4xl font-bold text-white">0</div>
            </div>
            <div class="flex-1 bg-zinc-900 rounded-3xl p-4 text-center">
                <div class="text-xs text-zinc-400 tracking-widest">BEST</div>
                <div id="best" class="text-4xl font-bold text-white">0</div>
            </div>
        </div>

        <!-- Game Grid -->
        <div id="grid" class="grid grid-cols-4 gap-3 bg-zinc-800 p-4 rounded-3xl shadow-2xl aspect-square"></div>

        <!-- Buttons -->
        <div class="mt-8 flex gap-3">
            <button id="restart" 
                    class="flex-1 bg-amber-400 hover:bg-amber-300 text-black font-bold text-xl py-5 rounded-3xl transition">
                NEW GAME
            </button>
            <a href="https://www.buymeacoffee.com/yourusername" target="_blank"
               class="flex-1 bg-emerald-500 hover:bg-emerald-400 font-bold text-xl py-5 rounded-3xl flex items-center justify-center gap-2 transition">
                ☕ Support Me
            </a>
        </div>

        <p class="text-center text-zinc-500 text-xs mt-6">Swipe or use arrow keys • Reach 2048 to win!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
